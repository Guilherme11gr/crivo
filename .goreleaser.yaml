version: 2

project_name: crivo

builds:
  - id: crivo
    main: ./cmd/crivo/
    binary: crivo
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    flags:
      - -trimpath

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

nfpms:
  - id: default
    package_name: crivo
    description: "Lightweight quality gate for code analysis"
    maintainer: "Guilherme Revoredo"
    license: MIT
    formats:
      - deb
      - rpm
