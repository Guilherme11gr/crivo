name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - run: go vet ./...

      - run: go test ./internal/... -count=1 -race

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Build (linux)
        run: go build ./cmd/qg/

      - name: Build (windows)
        run: GOOS=windows GOARCH=amd64 go build -o qg.exe ./cmd/qg/
